<title>West Seattle Bar Crawl — GBC Edition</title>
<link rel="icon" href="appicon.png">
<link rel="apple-touch-icon" href="appicon.png">
<meta name="apple-mobile-web-app-title" content="Bar Crawl">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
:root{
  --shell:#5a3fa0;--shell-dark:#3b2870;--shell-light:#7a5cc8;--bezel:#15131f;
  --lcd:#c8d99a;--lcd-dark:#9bb066;--lcd-deep:#5c7038;
  --ink:#21300f;--paper:#e7f0c8;--cream:#f4f7e3;
  --gold:#f8b800;--red:#e83000;--accent:#e8407c;--blue:#2a7de1;--shadow:rgba(0,0,0,.35);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{font-family:'VT323',monospace;background:repeating-linear-gradient(45deg,#241a3f 0 14px,#221838 14px 28px);
  color:var(--ink);min-height:100vh;display:flex;justify-content:center;padding:10px;}
.pix{font-family:'Pixelify Sans',sans-serif;font-weight:700;letter-spacing:.5px;}

.device{width:100%;max-width:480px;background:linear-gradient(160deg,var(--shell-light),var(--shell) 40%,var(--shell-dark));
  border-radius:18px 18px 46px 18px;padding:30px 14px 58px;box-shadow:0 14px 0 var(--shell-dark),0 22px 40px var(--shadow);position:relative;}
.device::after{content:"GAME BOY COLOR";position:absolute;left:0;right:0;bottom:5px;text-align:center;
  font-family:'Press Start 2P';font-size:8px;letter-spacing:1px;color:#d9c7ff;text-shadow:1px 1px 0 var(--shell-dark);}
.brand-dot{position:absolute;top:11px;left:18px;display:flex;align-items:center;gap:6px;font-family:'Press Start 2P';font-size:6px;color:#e9deff;}
.brand-dot b{width:8px;height:8px;border-radius:50%;background:#ff4d4d;display:inline-block;box-shadow:0 0 5px 1px rgba(255,70,70,.8);}
.bezel{background:var(--bezel);border-radius:10px 10px 28px 10px;padding:22px 14px 14px;margin-top:6px;box-shadow:inset 0 0 0 3px #2a2640;}
.screen{background:var(--lcd);border-radius:5px;overflow:hidden;box-shadow:inset 0 0 22px rgba(0,0,0,.25);position:relative;image-rendering:pixelated;}
.screen::before{content:"";position:absolute;inset:0;pointer-events:none;z-index:40;background:repeating-linear-gradient(0deg,rgba(0,0,0,.05) 0 2px,transparent 2px 4px);border-radius:5px;}

header{background:linear-gradient(180deg,var(--lcd-dark),var(--lcd-deep));color:var(--cream);padding:7px 9px;border-bottom:3px solid var(--ink);display:flex;align-items:center;gap:10px;}
.hdr-right{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.logo{display:block;margin:0;max-height:82px;max-width:54%;height:auto;width:auto;flex:0 0 auto;}
.title{font-size:23px;line-height:1;display:flex;flex-direction:column;gap:1px;align-items:center;}
.title .t1{text-shadow:2px 2px 0 var(--ink);}
.title .t2{color:var(--gold);font-size:21px;text-shadow:2px 2px 0 var(--ink);}
.subbar{display:flex;justify-content:space-between;align-items:flex-end;gap:8px;margin-top:8px;}
.meta{font-size:17px;color:var(--paper);line-height:1.1;}.meta b{color:var(--gold);}
.selectwrap label{display:block;font-family:'Press Start 2P';font-size:5px;color:var(--paper);margin-bottom:3px;text-align:right;}
select#player{font-family:'Pixelify Sans';font-weight:700;font-size:14px;background:var(--cream);color:var(--ink);
  border:3px solid var(--ink);border-radius:3px;padding:6px 6px;max-width:150px;box-shadow:2px 2px 0 var(--ink);cursor:pointer;}

.pstrip{display:none;align-items:center;gap:9px;padding:8px 9px;background:var(--cream);border-bottom:3px solid var(--ink);}
.pstrip.show{display:flex;}
.avatar{width:44px;height:44px;flex:0 0 44px;background:var(--c,#888);border:3px solid var(--ink);border-radius:4px;display:flex;align-items:center;justify-content:center;
  font-family:'Pixelify Sans';font-weight:700;font-size:15px;color:#fff;text-shadow:1px 1px 0 rgba(0,0,0,.5);position:relative;overflow:hidden;image-rendering:pixelated;}
.avatar .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.pstrip .nm{font-size:21px;line-height:1;}
.pstrip .sl{font-size:16px;color:#3a4a1c;line-height:1.05;font-style:italic;}

/* walking scene */
.scene{position:relative;height:112px;border:3px solid var(--ink);border-radius:4px;overflow:hidden;margin-bottom:11px;box-shadow:3px 3px 0 var(--ink);
  background:linear-gradient(180deg,#bcd0e8 0%,#d4e3b4 54%,#9bb066 54%,#9bb066 100%);}
.scene .ico{position:absolute;opacity:.85;}
.scene .road{position:absolute;left:0;right:0;bottom:0;height:22px;border-top:2px solid var(--ink);
  background:repeating-linear-gradient(90deg,#74854c 0 12px,#88995a 12px 24px);animation:roll .5s linear infinite;}
@keyframes roll{to{background-position:-24px 0;}}
.scene .flag{position:absolute;right:9px;bottom:20px;font-size:24px;z-index:3;}
.scene .cast{position:absolute;bottom:18px;left:12px;right:44px;display:flex;gap:5px;align-items:flex-end;z-index:2;}
.scene .solo{justify-content:center;}
.scene.withbld .cast{right:42%;}
.scene .bld{position:absolute;right:6px;bottom:18px;height:82px;width:auto;z-index:1;image-rendering:pixelated;}
.scene .label{position:absolute;left:0;right:0;bottom:2px;text-align:center;font-family:'Pixelify Sans';font-weight:700;font-size:12px;color:var(--cream);text-shadow:1px 1px 0 var(--ink);z-index:3;}
.av{background:var(--c,#888);border:2px solid var(--ink);border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:'Pixelify Sans';font-weight:700;color:#fff;text-shadow:1px 1px 0 rgba(0,0,0,.4);overflow:hidden;position:relative;image-rendering:pixelated;}
.av .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.av.s{width:26px;height:26px;font-size:11px;} .av.l{width:48px;height:48px;font-size:17px;}
/* when a real sprite loads: show it ALONE — no box, no border, no initials */
.avatar img,.av img{display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:contain;image-rendering:pixelated;}
.avatar.imgok,.av.imgok{background:transparent!important;border:none;border-radius:0;overflow:visible;}
.avatar.imgok img,.av.imgok img{display:block;}
.avatar.imgok .ph,.av.imgok .ph{display:none;}
.bob{animation:bob .5s steps(2,end) infinite;}
@keyframes bob{50%{transform:translateY(-4px);}}

.tabbar{display:flex;overflow-x:auto;gap:5px;padding:8px;background:var(--lcd-deep);scrollbar-width:none;border-bottom:3px solid var(--ink);}
.tabbar::-webkit-scrollbar{display:none;}
.tab{flex:0 0 auto;font-family:'Pixelify Sans';font-weight:600;font-size:13px;color:var(--ink);background:var(--cream);
  border:2px solid var(--ink);border-radius:3px;padding:6px 9px;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;box-shadow:2px 2px 0 var(--ink);}
.tab .b{font-family:'Press Start 2P';font-size:8px;background:var(--ink);color:#fff;border-radius:2px;padding:2px 3px;min-width:14px;text-align:center;}
.tab.active{background:var(--gold);box-shadow:2px 2px 0 var(--shell-dark);}
.tab.match.active{background:#9cc9f2;}.tab.warm.active{background:#ffd166;}
.tab.food.active{background:#ff9b54;}.tab.final.active{background:#c9a6ff;}.tab.epi.active{background:#9be36b;}

.body{padding:11px 10px 16px;}
.card{background:var(--cream);border:3px solid var(--ink);border-radius:4px;box-shadow:3px 3px 0 var(--ink);overflow:hidden;}
.card .head{display:flex;align-items:center;gap:9px;padding:9px;color:#fff;border-bottom:3px solid var(--ink);}
.card.warm .head{background:#caa23a;}.card.match .head{background:#2f7dc4;}
.card.food .head{background:#d2682f;}.card.final .head{background:#7d5bbd;}.card.epi .head{background:#4f9a3a;}
.card .head .ic{font-size:24px;}
.card .head .nm{font-family:'Pixelify Sans';font-weight:700;font-size:20px;line-height:1;text-shadow:1px 1px 0 rgba(0,0,0,.4);}
.card .head .ty{font-size:14px;opacity:.95;line-height:1;}
.card .head .tm{margin-left:auto;font-family:'Pixelify Sans';font-weight:700;font-size:13px;background:rgba(0,0,0,.25);padding:5px 6px;border-radius:3px;white-space:nowrap;text-align:right;}
.card .head .hx{flex:1;min-width:0;}
.headlinks{display:flex;gap:6px;margin-left:auto;}
.headlinks a{display:flex;flex-direction:column;align-items:center;text-decoration:none;color:#fff;background:rgba(0,0,0,.2);border-radius:4px;padding:3px 5px 2px;}
.headlinks a img{width:22px;height:22px;object-fit:contain;display:block;image-rendering:pixelated;}
.headlinks a b{font-family:'Pixelify Sans';font-weight:700;font-size:9px;margin-top:1px;text-shadow:1px 1px 0 rgba(0,0,0,.4);}
.addrline{font-size:16px;color:#3a4a1c;margin-bottom:8px;}
.addrline b{color:var(--red);}
.inner{padding:10px;}
.tags{margin:0 0 9px;}
.tag{display:inline-block;font-family:'Pixelify Sans';font-weight:600;font-size:11px;padding:3px 6px;border:2px solid var(--ink);border-radius:3px;margin:0 4px 5px 0;background:#fff;}
.tag.ok{background:#9be36b;}.tag.res{background:#ffd166;}.tag.age{background:#ffc4e0;}
.lab{font-family:'Pixelify Sans';font-weight:700;font-size:13px;color:var(--accent);margin:10px 0 5px;}
ul.bul{list-style:none;margin:0;padding:0;}
ul.bul li{font-size:17px;line-height:1.2;color:#33421a;padding:4px 0 4px 18px;position:relative;border-bottom:1px dotted var(--lcd-dark);}
ul.bul li:last-child{border-bottom:none;}
ul.bul li::before{content:"▸";position:absolute;left:0;color:var(--red);}
ul.bul li b{color:var(--red);}
ul.recs li{padding-left:24px;}
ul.recs .num{position:absolute;left:0;top:5px;font-family:'Press Start 2P';font-size:8px;color:#fff;background:var(--ink);width:16px;height:16px;border-radius:3px;display:flex;align-items:center;justify-content:center;}
ul.recs .k{font-family:'Pixelify Sans';font-weight:700;font-size:10px;color:var(--accent);margin-right:5px;}
.links{display:flex;gap:7px;margin-top:11px;}
.links a{flex:1;text-align:center;text-decoration:none;font-family:'Pixelify Sans';font-weight:700;font-size:13px;background:#fff;color:var(--ink);border:2px solid var(--ink);border-radius:3px;padding:7px 4px;box-shadow:2px 2px 0 var(--ink);}
.links a:active{transform:translate(2px,2px);box-shadow:none;}
.factbox{margin-top:11px;background:#fff8d8;border:2px dashed var(--ink);border-radius:4px;padding:8px;}
.factbox .own{font-family:'Pixelify Sans';font-weight:700;font-size:12px;margin-bottom:4px;}
.factbox .ttl{font-family:'Pixelify Sans';font-weight:700;font-size:17px;color:var(--ink);line-height:1;margin-bottom:4px;}
.factbox p{margin:0;font-size:16px;line-height:1.2;color:#3a4a1c;}
.factbox.lore{background:#eaf3fb;}
.factbox .learn{display:inline-block;margin-top:6px;font-family:'Pixelify Sans';font-weight:700;font-size:13px;color:var(--blue);text-decoration:underline;}
.pinfact{background:#fff3c4;border:3px solid var(--ink);border-radius:4px;box-shadow:3px 3px 0 var(--ink);padding:9px;margin-bottom:12px;}
.pinlab{font-family:'Pixelify Sans';font-weight:700;font-size:12px;color:var(--accent);margin-bottom:4px;}
.wcline{margin-top:11px;background:#eafbe0;border:2px solid var(--ink);border-radius:3px;padding:8px;font-size:16px;line-height:1.2;color:#274a17;}
.wcline .h{font-family:'Pixelify Sans';font-weight:700;color:#2f7d1f;margin-right:5px;}

.route{background:var(--cream);border:3px solid var(--ink);border-radius:4px;box-shadow:3px 3px 0 var(--ink);padding:9px;}
.rtitle{font-family:'Pixelify Sans';font-weight:700;font-size:16px;margin:0 0 9px;color:var(--ink);}
.ovw{display:flex;gap:6px;margin:0 0 10px;}
.ovw div{flex:1;background:#fff;border:2px solid var(--ink);border-radius:3px;padding:6px 4px;text-align:center;box-shadow:2px 2px 0 var(--ink);}
.ovw b{font-family:'Pixelify Sans';font-weight:700;font-size:15px;color:var(--red);display:block;line-height:1;}
.ovw span{font-size:13px;color:#3a4a1c;}
.rrow{display:flex;align-items:center;gap:9px;cursor:pointer;padding:3px 0;}
.rrow .pin{width:32px;height:32px;flex:0 0 32px;border:3px solid var(--ink);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.rrow.warm .pin{background:#ffd166;}.rrow.match .pin{background:#9cc9f2;}
.rrow.food .pin{background:#ff9b54;}.rrow.final .pin{background:#c9a6ff;}.rrow.epi .pin{background:#9be36b;}
.rrow .nm{font-family:'Pixelify Sans';font-weight:700;font-size:15px;line-height:1;}
.rrow .tm{font-size:14px;color:var(--lcd-deep);line-height:1.05;}
.rconn{margin-left:15px;padding:3px 0 3px 16px;border-left:3px dotted var(--ink);font-size:14px;color:#5c7038;line-height:1.15;}
.rconn .w{margin-left:-26px;margin-right:8px;}
.legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px;}
.legend span{font-size:14px;display:flex;align-items:center;gap:3px;color:#3a4a1c;}
.legend i{width:11px;height:11px;border:1px solid var(--ink);border-radius:2px;display:inline-block;}
.footer{font-family:'Pixelify Sans';font-weight:600;font-size:11px;color:var(--lcd-deep);text-align:center;line-height:1.7;margin-top:12px;padding-top:8px;border-top:2px dashed var(--lcd-dark);}
.wa{position:fixed;right:12px;bottom:74px;width:54px;height:54px;z-index:200;}
.wa img{width:100%;height:100%;object-fit:contain;image-rendering:pixelated;filter:drop-shadow(2px 3px 2px rgba(0,0,0,.55));}
.wa:active{transform:scale(.94);}
.dpad{position:absolute;bottom:14px;left:24px;width:38px;height:38px;opacity:.85;}
.dpad::before,.dpad::after{content:"";position:absolute;background:#2a1f55;border-radius:3px;box-shadow:inset 0 0 0 2px #1c1440;}
.dpad::before{left:13px;top:0;width:12px;height:38px;}.dpad::after{left:0;top:13px;width:38px;height:12px;}
.btns{position:absolute;bottom:16px;right:26px;display:flex;gap:10px;transform:rotate(-22deg);}
.btns b{width:22px;height:22px;border-radius:50%;background:var(--accent);box-shadow:0 3px 0 #a82b58;display:block;}
</style>
</head>

const LORE={owner:"fabri",title:"Birthplace of Seattle",url:"https://en.wikipedia.org/wiki/Alki_Point,_Seattle",
  short:"Alki, just west of here, is where Seattle began.",
  long:"The Dkhw'Duw'Absh (Duwamish) lived in cedar longhouses here for millennia. On Nov 13, 1851 the Denny Party landed at nearby Alki and named it 'New York Alki' — 'Alki' is Chinook for 'by and by / someday.'"};

const WALKS={admiral:"🚶 WALK SOUTH ~1.2 mi / 25 min — the history leg",
  elliott:"🚶 ~2 min back north (past Easy Street) to Lady Jaye",
  ladyjaye:"🚶 1 block to Camp West",campwest:"🚶 1 block — the epilogue"};

let cur="map";
const $=id=>document.getElementById(id);
function avHTML(p,cls,styleExtra){return `<div class="${cls}" style="--c:${p.color};${styleExtra||''}">
  <img src="avatars/${p.id}.png" alt="" onload="this.parentNode.classList.add('imgok')" onerror="this.remove()">
  <span class="ph">${ini(p.name)}</span></div>`;}

/* animated walking scene */
function sceneHTML(who){
  const SC=[['tree','🌲','6%',26],['mountain','🏔️','27%',30],['needle','🗼','48%',30],['ferry','⛴️','67%',28],['tree','🌲','88%',24]];
  const icos=SC.map(s=>`<span class="ico" style="left:${s[2]};bottom:40px;width:${s[3]}px;font-size:${s[3]}px"><img src="icons/${s[0]}.png" alt="" style="width:${s[3]}px;height:auto;display:block;image-rendering:pixelated" onerror="this.outerHTML='${s[1]}'"></span>`).join("");
  let cast;
  if(who==="crew"){
    cast=`<div class="cast">`+PLAYERS.map((p,i)=>avHTML(p,"av s bob",`animation-delay:${(i*0.07).toFixed(2)}s`)).join("")+`</div>`;
  }else{
    const p=P(who);
    cast=`<div class="cast solo">${avHTML(p,"av l bob")}</div><div class="label">▶ ${p.name.toUpperCase()} IS ON THE CRAWL</div>`;
  }
  const st=STOPS.find(s=>s.id===cur);
  const bld=st?`<img class="bld" src="icons/bld_${st.id}.png" alt="" onerror="this.remove()">`:"";
  return `<div class="scene${st?' withbld':''}">${icos}${bld}${cast}<div class="road"></div></div>`;
}

function buildSelect(){const s=$("player");PLAYERS.forEach(p=>{const o=document.createElement("option");o.value=p.id;o.textContent=p.name.toUpperCase();s.appendChild(o);});}
function buildTabs(){
  let h=`<div class="tab ${cur==='map'?'active':''}" onclick="go('map')">MAP</div>`;
  STOPS.forEach((s,i)=>{
    h+=`<div class="tab ${s.cls} ${cur===s.id?'active':''}" onclick="go('${s.id}')"><span class="b">${s.pin}</span>${s.name.toUpperCase()}</div>`;
    if(i===0)h+=`<div class="tab ${cur==='history'?'active':''}" onclick="go('history')">HISTORY</div>`;
  });
  $("tabbar").innerHTML=h;
}
const HIST=[
 {f:STOPS[0].fact,where:"Outside Admiral Pub · 2343 California"},
 {f:STOPS[3].fact,where:"All along California Ave as you walk"},
 {f:STOPS[2].fact,where:"California & Alaska"},
 {f:STOPS[4].fact,where:"California & Alaska · the old Junction"},
 {f:STOPS[1].fact,where:"4721 California · across from Elliott Bay"},
 {f:LORE,where:"Alki Point · ~2 mi west · the origin"}
];
function historyHTML(who){
  let pin="",list=HIST;
  if(who!=="crew"){
    const mine=HIST.find(it=>it.f.owner===who);
    if(mine){pin=`<div class="pinfact"><div class="pinlab">★ ${P(who).name.toUpperCase()} — YOUR FACT TO SHARE</div><div class="lab" style="color:#1f5f9d;margin:0 0 3px">${mine.where}</div>${factHTML(mine.f,who,true)}</div>`;
      list=HIST.filter(it=>it.f.owner!==who);}
  }
  const items=list.map(it=>`<div style="margin-bottom:6px"><div class="lab" style="color:#1f5f9d;margin:6px 0 3px">${it.where}</div>${factHTML(it.f,who,true)}</div>`).join("");
  const intro=who==="crew"
    ?`Most of the history hits on the long <b>Admiral → Junction</b> walk. Spot these in order — each guy owns one, so pick your name to pin yours up top.`
    :`The rest of the walking tour (spot these in order):`;
  return `${pin}<div class="route" style="margin-bottom:11px"><div class="rtitle pix">THE WALKING TOUR</div>
    <p style="font-size:16px;color:#33421a;margin:0">${intro}</p></div>${items}`;
}
function factHTML(f,who,lore){
  const o=P(f.owner),isOwner=who===o.id,txt=isOwner?f.long:f.short;
  const tag=isOwner?"YOUR FACT TO SHARE":`Ask <b style="color:${o.color}">${o.name}</b>`;
  const link=(isOwner&&f.url)?`<a class="learn" href="${f.url}" target="_blank">Learn more →</a>`:"";
  return `<div class="factbox ${lore?'lore':''}"><div class="own" style="color:${o.color}">${tag}</div>
    <div class="ttl">${f.title}</div><p>${txt}</p>${link}</div>`;
}
function stopHTML(s,who){
  const tags=s.tags.map(t=>`<span class="tag ${t[0]}">${t[1]}</span>`).join("");
  let mid;
  if(who==="crew"){mid=`<div class="lab">▣ THE GROUP MOVE</div><ul class="bul">${s.group.map(b=>`<li>${b}</li>`).join("")}</ul>`;}
  else{const r=s.recs[who]||[];mid=`<div class="lab">★ ${P(who).name.toUpperCase()}'S 3 MOVES</div><ul class="bul recs">${r.map((x,i)=>`<li><span class="num">${i+1}</span><span class="k">${x[0]}</span>${x[1]}</li>`).join("")}</ul>`;}
  const wc=s.wc?`<div class="wcline"><span class="h">WORLD CUP</span>${s.wc}</div>`:"";
  return `<div class="card ${s.cls}">
    <div class="head">
      <span class="ic"><img src="icons/${s.id}.png" alt="" style="width:28px;height:28px;object-fit:contain;display:block;image-rendering:pixelated" onerror="this.outerHTML='${s.icon}'"></span>
      <div class="hx"><div class="nm">${s.name}</div><div class="ty">${s.type}</div></div>
      <div class="headlinks"><a href="${s.maps}" target="_blank"><img src="icons/map.png" alt="" onerror="this.style.display='none'"><b>MAP</b></a><a href="${s.menu}" target="_blank"><img src="icons/menu.png" alt="" onerror="this.style.display='none'"><b>MENU</b></a></div>
    </div>
    <div class="inner"><div class="addrline">${s.addr} · <b>${s.time.replace('<br>',' ')}</b></div>
      <div class="tags">${tags}</div>${mid}
      ${wc}</div></div>`;
}
function mapHTML(who){
  let rows="";
  STOPS.forEach(s=>{
    rows+=`<div class="rrow ${s.cls}" onclick="go('${s.id}')"><div class="pin">${s.pin}</div><div><div class="nm">${s.name}</div><div class="tm">${s.time.replace('<br>',' ')} · ${s.type.split(' · ')[0]}</div></div></div>`;
  });
  return `<div class="route"><div class="rtitle pix">THE CRAWL PLAN</div>
    ${rows}
    <div class="legend"><span><i style="background:#ffd166"></i>warm-up</span><span><i style="background:#9cc9f2"></i>brewery</span>
      <span><i style="background:#ff9b54"></i>food</span><span><i style="background:#c9a6ff"></i>finale</span><span><i style="background:#9be36b"></i>epilogue</span></div>
  </div>`;
}
function render(){
  const who=$("player").value;
  const strip=$("pstrip");if(strip){strip.className="pstrip";strip.innerHTML="";}
  buildTabs();
  const main=cur==="map"?mapHTML(who):cur==="history"?historyHTML(who):stopHTML(STOPS.find(s=>s.id===cur),who);
  $("body").innerHTML=sceneHTML(who)+main
    +`<div class="footer">I <span style="color:var(--red)">♥</span> WEST SEATTLE · <a href="why.html" style="color:inherit;text-decoration:underline">Why these stops?</a></div>`;
}
function go(t){cur=t;render();}
function onPlayer(){render();}
buildSelect();render();
</script>
</body>
</html>
